name: Build Broot

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - uses: android-actions/setup-android@v3

      - name: Install SDK components
        run: sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Create directories
        run: |
          mkdir -p app/src/main/java/com/broot
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/res/mipmap-anydpi-v26

      - name: settings.gradle.kts
        run: |
          cat << 'EOF' > settings.gradle.kts
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "Broot"
          include(":app")
          EOF

      - name: root build.gradle.kts
        run: |
          cat << 'EOF' > build.gradle.kts
          plugins {
              id("com.android.application") version "8.5.0" apply false
              id("org.jetbrains.kotlin.android") version "1.9.24" apply false
          }
          EOF

      - name: app/build.gradle.kts
        run: |
          cat << 'EOF' > app/build.gradle.kts
          plugins {
              id("com.android.application")
              id("org.jetbrains.kotlin.android")
          }
          android {
              namespace = "com.broot"
              compileSdk = 34
              defaultConfig {
                  applicationId = "com.broot"
                  minSdk = 24
                  targetSdk = 34
                  versionCode = 2
                  versionName = "1.1"
              }
              buildTypes {
                  release { isMinifyEnabled = false }
              }
              buildFeatures { compose = true }
              composeOptions { kotlinCompilerExtensionVersion = "1.5.14" }
              compileOptions {
                  sourceCompatibility = JavaVersion.VERSION_17
                  targetCompatibility = JavaVersion.VERSION_17
              }
              kotlinOptions { jvmTarget = "17" }
          }
          dependencies {
              val composeBom = platform("androidx.compose:compose-bom:2024.06.00")
              implementation(composeBom)
              implementation("androidx.compose.ui:ui")
              implementation("androidx.compose.material3:material3")
              implementation("androidx.activity:activity-compose:1.9.0")
              implementation("androidx.core:core-ktx:1.13.1")
              implementation("org.jetbrains.kotlinx:kotlinx-coroutines-android:1.8.1")
          }
          EOF

      - name: gradle.properties
        run: |
          cat << 'EOF' > gradle.properties
          android.useAndroidX=true
          org.gradle.jvmargs=-Xmx2g
          EOF

      - name: AndroidManifest.xml
        run: |
          cat << 'EOF' > app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE"
                  android:maxSdkVersion="32"/>
              <uses-permission android:name="android.permission.READ_MEDIA_AUDIO"/>
              <application
                  android:label="Broot"
                  android:icon="@mipmap/ic_launcher"
                  android:roundIcon="@mipmap/ic_launcher_round"
                  android:theme="@style/AppTheme"
                  android:supportsRtl="true">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:configChanges="orientation|screenSize|keyboardHidden">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: themes.xml
        run: |
          cat << 'EOF' > app/src/main/res/values/themes.xml
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="AppTheme" parent="android:Theme.Material.NoActionBar">
                  <item name="android:windowBackground">@android:color/black</item>
              </style>
          </resources>
          EOF

      - name: launcher foreground vector
        run: |
          cat << 'EOF' > app/src/main/res/drawable/ic_launcher_foreground.xml
          <?xml version="1.0" encoding="utf-8"?>
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="108dp" android:height="108dp"
              android:viewportWidth="108" android:viewportHeight="108">
              <path
                  android:fillColor="#00000000"
                  android:strokeColor="#FFFFFF"
                  android:strokeWidth="5"
                  android:strokeLineCap="round"
                  android:strokeLineJoin="round"
                  android:pathData="M 14,54 C 20,40 26,27 32,54 C 38,68 44,81 50,54 C 56,40 62,27 68,54 C 74,68 80,81 86,54"/>
          </vector>
          EOF

      - name: adaptive icon XMLs
        run: |
          cat << 'EOF' > app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@android:color/black"/>
              <foreground android:drawable="@drawable/ic_launcher_foreground"/>
          </adaptive-icon>
          EOF
          cp app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml \
             app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml

      - name: Generate PNG icons
        run: |
          python3 << 'EOF'
          import struct, zlib, os

          def make_png(path, size, r=13, g=13, b=46):
              row = bytes([r, g, b] * size)
              raw = b"".join(b"\x00" + row for _ in range(size))
              idat = zlib.compress(raw, 6)
              ihdr = struct.pack(">IIBBBBB", size, size, 8, 2, 0, 0, 0)
              def chunk(t, d):
                  c = t + d
                  return struct.pack(">I", len(d)) + c + struct.pack(">I", zlib.crc32(c) & 0xFFFFFFFF)
              with open(path, "wb") as f:
                  f.write(b"\x89PNG\r\n\x1a\n" + chunk(b"IHDR", ihdr) + chunk(b"IDAT", idat) + chunk(b"IEND", b""))

          for dpi, sz in [("xxxhdpi",192),("xxhdpi",144),("xhdpi",96),("hdpi",72),("mdpi",48)]:
              d = f"app/src/main/res/mipmap-{dpi}"
              os.makedirs(d, exist_ok=True)
              make_png(f"{d}/ic_launcher.png", sz)
              make_png(f"{d}/ic_launcher_round.png", sz)
              print(f"  {dpi}: {sz}x{sz} ok")
          EOF

      - name: Copy MainActivity.kt
        run: cp MainActivity.kt app/src/main/java/com/broot/MainActivity.kt

      - name: Build APK
        run: gradle assembleDebug --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: broot-debug
          path: app/build/outputs/apk/debug/app-debug.apk
